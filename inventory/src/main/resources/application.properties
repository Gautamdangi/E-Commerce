spring.application.name=Inventory-Service
server.port =8081

spring.datasource.url=jdbc:mysql://localhost:3306/inventorydb
spring.datasource.username=root
spring.datasource.password=GautamD@5678

spring.jpa.hibernate.ddl-auto =update
spring.jpa.show-sql=true

spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.consumer.group-id=inventory-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=com.gautam.inventory.event.ProductCreatedEvent
spring.kafka.producer.properties.spring.json.add.type.headers=false



#OpenAPI JSON
springdoc.api-docs.path=/api-docs/inventory
#Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html/inventory

