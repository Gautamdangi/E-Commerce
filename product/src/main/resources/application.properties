spring.application.name=Product-Catalog
server.port= 8084
#database connectivity mysql
spring.datasource.url=jdbc:mysql://localhost:3306/productdetaildb
spring.datasource.username=root
spring.datasource.password=GautamD@5678

spring.jpa.hibernate.ddl-auto =update
spring.jpa.show-sql=true


#service registry
eureka.instance.prefer-ip-address=true
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.client.service-url.defaultZone= http://localhost:8761/eureka

#Kafka config

spring.kafka.producer.retries=5
spring.kafka.producer.properties.max.block.ms=10000


spring.kafka.bootstrap-servers= localhost:9092
spring.kafka.producer.properties.spring.json.add.type.headers=false
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer


#OpenAPI JSON
springdoc.api-docs.path=/api-docs/product
#Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html/product


#redis
spring.cache.type=redis
spring.data.redis.host=localhost
spring.data.redis.port=6379